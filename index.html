<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Thi JLPT N1</title>
    <style>
        :root {
            --primary: #1a73e8;
            --success: #1e8e3e;
            --error: #d93025;
            --warning: #fb8c00;
            --bg: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); padding: 20px; color: #3c4043; line-height: 1.6; }
        .container { max-width: 750px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        h2 { color: var(--primary); margin-bottom: 10px; text-transform: uppercase; }

        .lesson-picker { background: #e8f0fe; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
        label { font-weight: bold; color: var(--primary); }
        select { padding: 12px; border-radius: 8px; border: 2px solid var(--primary); font-size: 16px; cursor: pointer; min-width: 220px; outline: none; }

        .question-box { margin-bottom: 25px; padding: 25px; border: 1px solid #dadce0; border-radius: 12px; transition: 0.3s; position: relative; background: #fff; }
        .question-text { font-weight: bold; font-size: 1.15em; display: block; margin-bottom: 20px; color: #202124; border-left: 5px solid var(--primary); padding-left: 15px; }
        
        .is-skipped { background-color: #fff7ed; border: 2.5px solid var(--warning) !important; }
        .warning-msg { color: var(--warning); font-weight: bold; font-size: 0.9em; display: none; margin-bottom: 15px; }
        .is-skipped .warning-msg { display: block; }

        .option-label { display: block; padding: 14px 18px; margin-bottom: 12px; border: 1.5px solid #dadce0; border-radius: 10px; cursor: pointer; transition: 0.2s; background: #fdfdfd; font-size: 16px; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .option-label { background-color: #e8f0fe; border-color: var(--primary); color: var(--primary); font-weight: 600; }

        .correct-answer { background-color: #e6f4ea !important; border-color: var(--success) !important; color: var(--success) !important; font-weight: bold; }
        .correct-answer::after { content: " ✓"; font-weight: bold; }
        .wrong-answer { background-color: #fce8e6 !important; border-color: var(--error) !important; color: var(--error) !important; }
        .wrong-answer::after { content: " ✗"; font-weight: bold; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; display: flex; align-items: center; justify-content: center; margin-top: 10px; }
        .btn-submit { background-color: var(--primary); box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3); }
        .btn-submit:hover { background-color: #174ea6; transform: translateY(-2px); }
        .btn-reload { background-color: #5f6368; margin-top: 20px; }

        #result-summary { display: none; margin-top: 25px; padding: 25px; border-radius: 12px; text-align: center; font-size: 24px; font-weight: bold; border: 3px solid var(--primary); background: #e8f0fe; animation: fadeIn 0.5s; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 600px) {
            .container { padding: 15px; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Luyện Thi JLPT N1 - Từ Vựng</h2>
        <div class="lesson-picker">
            <label for="sheet-selector">📖 Chọn bài:</label>
            <select id="sheet-selector" onchange="changeSheet()">
                <option value="Bai_1">Bài học số 1</option>
                <option value="Bai_2">Bài học số 2</option>
                <option value="Bai_3">Bài học số 3</option>
                <option value="Bai_4">Bài học số 4</option>
                <option value="Bai_5">Bài học số 5</option>
                <option value="Bai_6">Bài học số 6</option>
                <option value="Bai_7">Bài học số 7</option>
                <option value="Bai_8">Bài học số 8</option>
                <option value="Bai_9">Bài học số 9</option>
                <option value="Bai_10">Bài học số 10</option>
                <option value="Bai_11">Bài học số 11</option>
                <option value="Bai_12">Bài học số 12</option>
                <option value="Bai_13">Bài học số 13</option>
                <option value="Bai_14">Bài học số 14</option>
                <option value="Bai_15">Bài học số 15</option>
                <option value="Bai_16">Bài học số 16</option>
                <option value="Bai_17">Bài học số 17</option>
                <option value="Bai_18">Bài học số 18</option>
                <option value="Bai_19">Bài học số 19</option>
                <option value="Bai_20">Bài học số 20</option>
            </select>
        </div>
    </header>
    
    <div id="quiz-form">Đang kết nối dữ liệu...</div>

    <button id="submit-btn" class="btn btn-submit" onclick="handleSubmission()">NỘP BÀI KIỂM TRA</button>
    
    <div id="result-summary"></div>
    
    <button id="reload-btn" class="btn btn-reload" style="display:none" onclick="location.reload()">LÀM LẠI BÀI MỚI</button>
</div>

<script>
    const SHEET_ID = '1UM95fL63K91ih4AXuiV28Im5QRC-V9eDVhifbQV4B8w'; 

    let shuffledData = [];

    async function loadData(sheetName) {
        const form = document.getElementById('quiz-form');
        form.innerHTML = "<div style='text-align:center; padding:30px;'>⌛ Đang tải dữ liệu...</div>";
        
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
        
        try {
            const resp = await fetch(URL);
            const text = await resp.text();
            
            const rows = text.split('\n').slice(1);
            const raw = rows.map(r => {
                const c = r.split('","').map(x => x.replace(/"/g, '').trim());
                return { q: c[0], options: [c[1], c[2], c[3], c[4]].filter(x => x), correct: c[5] };
            }).filter(item => item.q);

            if (raw.length === 0) {
                form.innerHTML = "<b style='color:red'>Lỗi: Không tìm thấy dữ liệu!</b>";
                return;
            }

            shuffledData = raw.sort(() => 0.5 - Math.random()).map(item => ({
                ...item, options: item.options.sort(() => 0.5 - Math.random())
            }));

            renderQuiz();
            resetUI();
        } catch (e) {
            form.innerHTML = "<b style='color:red'>Lỗi kết nối dữ liệu!</b>";
        }
    }

    function renderQuiz() {
        const form = document.getElementById('quiz-form');
        form.innerHTML = shuffledData.map((item, qIdx) => `
            <div class="question-box" id="box-${qIdx}">
                <div class="warning-msg">⚠️ Bạn chưa chọn đáp án!</div>
                <span class="question-text">Câu ${qIdx + 1}: ${item.q}</span>
                ${item.options.map((opt, oIdx) => `
                    <label>
                        <input type="radio" name="q${qIdx}" value="${opt}" onchange="clearWarning(${qIdx})">
                        <span class="option-label" id="label-${qIdx}-${oIdx}">${opt}</span>
                    </label>
                `).join('')}
            </div>
        `).join('');
    }

    function clearWarning(idx) {
        document.getElementById(`box-${idx}`).classList.remove('is-skipped');
    }

    function changeSheet() {
        loadData(document.getElementById('sheet-selector').value);
    }

    function handleSubmission() {
        let unanswered = [];
        shuffledData.forEach((_, i) => {
            if(!document.querySelector(`input[name="q${i}"]:checked`)) {
                document.getElementById(`box-${i}`).classList.add('is-skipped');
                unanswered.push(i);
            }
        });

        if(unanswered.length > 0) {
            alert("Vui lòng hoàn thành tất cả các câu!");
            document.getElementById(`box-${unanswered[0]}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }
        gradeQuiz();
    }

    function gradeQuiz() {
        let score = 0;
        shuffledData.forEach((item, qIdx) => {
            const selected = document.querySelector(`input[name="q${qIdx}"]:checked`).value;
            if(selected === item.correct) score++;

            item.options.forEach((opt, oIdx) => {
                const label = document.getElementById(`label-${qIdx}-${oIdx}`);
                if(opt === item.correct) label.classList.add('correct-answer');
                if(selected === opt && opt !== item.correct) label.classList.add('wrong-answer');
            });
            document.getElementsByName(`q${qIdx}`).forEach(r => r.disabled = true);
        });

        const res = document.getElementById('result-summary');
        res.style.display = 'block';
        res.innerHTML = `KẾT QUẢ: ${score} / ${shuffledData.length}`;
        
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('reload-btn').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetUI() {
        document.getElementById('result-summary').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('reload-btn').style.display = 'none';
    }

    loadData(document.getElementById('sheet-selector').value);
</script>

</body>
</html>
