<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Thi JLPT N2</title>
    <style>
    @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.option-btn:disabled {
    cursor: not-allowed;
    opacity: 0.8;
}
        :root { 
            --primary: #1a73e8; 
            --success: #1e8e3e; 
            --error: #d93025;   
            --warning: #fb8c00; 
            --bg: #f8f9fa; 
            --text-black: #000000; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 0; color: var(--text-black); line-height: 1.6; margin: 0; }
        
           /* --- 1. CSS CHO ẢNH TRANG CHỦ (BANNER NẰM TRONG) --- */
.home-banner {
    max-width: 750px; /* Chiều rộng bằng khung câu hỏi */
    margin: 20px auto 0 auto; /* Căn giữa và sát vào khung dưới */
    height: 400px; /* Bạn có thể chỉnh độ cao tùy ý */
    overflow: hidden;
    border-radius: 15px 15px 0 0; /* Bo tròn 2 góc trên cho đẹp */
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    display: block;
}

.home-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.container { 
    max-width: 750px; 
    margin: 0 auto 20px auto; 
    background: white; 
    padding: 30px; 
    border-radius: 0 0 15px 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
    position: relative; 
}
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
  
.lesson-picker { 
    background: #f8f9fa; 
    padding: 15px; 
    border-radius: 10px; 
    margin-bottom: 25px; 
    text-align: left; 
    border-left: 5px solid var(--primary); 
}

        
        .q-box { margin-bottom: 25px; padding: 25px; border: 1px solid #dadce0; border-radius: 12px; background: #fff; transition: 0.3s; position: relative; }
        .q-text { font-weight: bold; font-size: 1.2em; display: block; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 15px; color: var(--text-black); }
        
        
        .warning-icon {
            display: none; 
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5em;
        }
        
        .warning-text {
            display: none; 
            color: var(--warning);
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

                .is-skipped { 
            border: 2.5px solid var(--warning) !important; 
            background-color: #fff7ed; 
        }
        .is-skipped .warning-icon,
        .is-skipped .warning-text {
            display: block; 
        }

                .opt-label { 
            display: block; 
            padding: 14px 18px; 
            margin-bottom: 12px; 
            border: 1.5px solid #dadce0; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.2s; 
            color: var(--text-black); 
            font-size: 16px;
            font-weight: 500;
        }
        
        input[type="radio"] { display: none; }

               input[type="radio"]:checked + .opt-label { 
            background: #e8f0fe; 
            border-color: var(--primary); 
            color: var(--primary) !important; 
            font-weight: bold;
        }

                .correct { 
            background: #e6f4ea !important; 
            border-color: var(--success) !important; 
            color: var(--success) !important; 
            font-weight: bold !important; 
        }
        .wrong { 
            background: #fce8e6 !important; 
            border-color: var(--error) !important; 
            color: var(--error) !important; 
            font-weight: bold !important; 
        }

                .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; transition: 0.3s; }
        .btn-submit { background: var(--primary); }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-reload { background: #5f6368; display: none; margin-top: 20px; }
        
        #res { display: none; margin-top: 25px; padding: 25px; border-radius: 12px; text-align: center; font-size: 24px; font-weight: bold; border: 3px solid var(--primary); background: #e8f0fe; color: var(--primary); }
    </style> 
</head> 
<body> 

<div class="home-banner">
    <img src="avata-1.jpg" alt="Ảnh trang chủ">
</div>

<div class="container">
    <header>

                <option value="Bai_9">Bài học số 9</option>
                <option value="Bai_10">Bài học số 10</option>
                <option value="Bai_11">Bài học số 11</option>
<option value="Bai_12">Bài học số 12</option>
<option value="Bai_13">Bài học số 13</option>

<option value="Bai_17">Bài học số 17</option>

<option value="Bai_19">Bài học số 19</option>

<option value="Bai_21">Bài học số 21</option>
<option value="Bai_22">Bài học số 22</option>

<option value="Bai_50">Bài học số 50</option>
            </select>
        </div>
    </header>
    
    <div id="quiz-form">Đang tải dữ liệu...</div>
    <button id="submit-btn" class="btn btn-submit" onclick="submit()">NỘP BÀI KIỂM TRA</button>
    <div id="res"></div>
    
    <button id="reload-btn" class="btn btn-reload" onclick="location.reload()">LÀM LẠI BÀI MỚI</button>
</div>

<script>
    const SHEET_ID = '1UM95fL63K91ih4AXuiV28Im5QRC-V9eDVhifbQV4B8w'; 
    let quizData = [];

    async function loadData(sheetName) {
        const area = document.getElementById('quiz-form');
        area.innerHTML = "<div style='text-align:center;'>⌛ Đang tải câu hỏi từ Google Sheets...</div>";
        
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
        
        try {
            const resp = await fetch(URL);
            if (!resp.ok) throw new Error("Lỗi kết nối! Hãy kiểm tra quyền chia sẻ Sheets.");
            
            const text = await resp.text();
            const rows = text.split('\n').slice(1);
            
            quizData = rows.map(r => {
                const c = r.split('","').map(x => x.replace(/"/g, '').trim());
                return { q: c[0], opts: [c[1], c[2], c[3], c[4],].filter(x => x), ans: c[5] };
            }).filter(i => i.q);

            if (quizData.length === 0) throw new Error("Tab này không có dữ liệu!");

            quizData.sort(() => 0.5 - Math.random());
            render();
            resetUI();
        } catch (e) {
            area.innerHTML = `<div style='color:red; font-weight:bold; padding:10px; border:1px solid red; border-radius:8px;'>LỖI: ${e.message}</div>`;
        }
    }

    function render() {
        const area = document.getElementById('quiz-form');
                area.innerHTML = quizData.map((item, i) => `
            <div class="q-box" id="box-${i}">
                <div class="warning-icon">⚠️</div>
                <div class="warning-text">Câu này chưa được trả lời!</div>
                <span class="q-text">Câu ${i + 1}: ${item.q}</span>
                ${item.opts.sort(() => 0.5 - Math.random()).map((o, oi) => `
                    <label>
                        <input type="radio" name="q${i}" value="${o}" onchange="clearWarning(${i})">
                        <span class="opt-label" id="l-${i}-${oi}">${o}</span>
                    </label>
                `).join('')}
            </div>
        `).join('');
    }

      function clearWarning(index) {
        document.getElementById(`box-${index}`).classList.remove('is-skipped');
    }

    function changeSheet() {
        loadData(document.getElementById('sheet-selector').value);
    }

    function submit() {
        let skippedIndices = [];
                quizData.forEach((_, i) => {
            if(!document.querySelector(`input[name="q${i}"]:checked`)) {
                skippedIndices.push(i);
            }
        });

                if(skippedIndices.length > 0) {
                        skippedIndices.forEach(i => document.getElementById(`box-${i}`).classList.add('is-skipped'));
            
            alert("Bạn vẫn còn " + skippedIndices.length + " câu chưa chọn đáp án!");
            
                       document.getElementById(`box-${skippedIndices[0]}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            return; 
        }

               let score = 0;
        quizData.forEach((item, i) => {
            const selInput = document.querySelector(`input[name="q${i}"]:checked`);
            const selValue = selInput.value;
            
            if(selValue === item.ans) score++;
            
            item.opts.forEach((o, oi) => {
                const lb = document.getElementById(`l-${i}-${oi}`);
                if(o === item.ans) lb.classList.add('correct');
                if(selValue === o && selValue !== item.ans) lb.classList.add('wrong');
            });
            document.getElementsByName(`q${i}`).forEach(r => r.disabled = true);
        });

        document.getElementById('res').style.display = 'block';
        document.getElementById('res').innerHTML = `KẾT QUẢ: ${score} / ${quizData.length}`;
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('reload-btn').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetUI() {
        document.getElementById('res').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('reload-btn').style.display = 'none';
    }

    loadData(document.getElementById('sheet-selector').value);
</script>
</body>
</html>
